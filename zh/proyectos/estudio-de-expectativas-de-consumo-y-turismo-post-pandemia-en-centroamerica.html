<p class="eyebrow">项目说明</p>
<p>该市场研究旨在梳理 COVID-19 后疫情背景下中美洲国家的旅游消费预期、旅行决策和趋势。研究为行动计划设计提供了战略信息，有助于缓解危机影响，并加快该地区旅游和经济活动的恢复。</p>
