    </nav>
  </header>

  <main>
    <section class="page-hero section-blue">
      <div class="container">
        <p class="eyebrow">联系我们</p>
        <h1>让我们讨论您的下一个项目</h1>
        <p>请填写表格，我们的团队将与您联系，并将您的咨询转交给相应领域的负责人。</p>
      </div>
    </section>

    <section class="section contact-section">
      <div class="container contact-grid">
        <div class="contact-copy">
          <p class="eyebrow">联系方式</p>

          <h2>我们随时为您提供帮助</h2>

          <p>您可以就机构咨询、旅游规划项目、经济研究、市场情报、可持续发展或战略发展与我们联系。</p>

          <div aria-label="联系方式" class="contact-details">
            <p>
              <strong>电话：</strong>
              +54 11 6091-4977
            </p>

            <p>
              <strong>地址：</strong>
              Av. Córdoba 5779, CABA
            </p>

            <p class="social-links">
              <a href="https://www.linkedin.com/company/estudio-singerman-y-makon?trk=blended-typeahead" rel="noopener" target="_blank">LinkedIn</a>
              <span>·</span>
              <a href="https://www.facebook.com/SingermanYMakon/" rel="noopener" target="_blank">Facebook</a>
              <span>·</span>
              <a href="https://www.instagram.com/singerman_makon/" rel="noopener" target="_blank">Instagram</a>
              <span>·</span>
              <a href="https://www.youtube.com/@EstSingermanyMakon" rel="noopener" target="_blank">YouTube</a>
            </p>
          </div>
        </div>

        <form action="https://formspree.io/f/xdabbvor" aria-label="联系我们" class="contact-form" data-contact-form="" method="POST">
          <input name="_subject" type="hidden" value="来自 Singerman & Makón 网站的新咨询"/>

          <div class="form-row two-columns">
            <label>
              姓名
              <input autocomplete="name" name="name" required type="text"/>
            </label>

            <label>
              电子邮件
              <input autocomplete="email" name="email" required type="email"/>
            </label>
          </div>

          <label>
            领域
            <select name="area" required>
              <option value="">– 请选择 –</option>
              <option>规划与发展</option>
              <option>营销与传播</option>
              <option>经济分析与评估</option>
              <option>市场情报</option>
              <option>并购</option>
              <option>可持续发展与环境管理</option>
            </select>
          </label>

          <label>
            留言
            <textarea name="message" required rows="5"></textarea>
          </label>

          <button class="btn" type="submit">
            发送咨询
          </button>
        </form>
      </div>
    </section>
